blueprint:
  name: Cámara - Enviar y guardar instantánea con disparadores personalizados y condiciones
  description: Este blueprint de automatización crea una instantánea de la cámara si se detecta movimiento,
    or si el estado de un sensor binario pasa de 'off' a 'on', y envía una notificación a
    tu teléfono con la imagen. Al hacer clic en la notificación, se navegará a la URL del cuadro de mando. [Más información](https://community.home-assistant.io/t/camera-send-save-snapshot-to-mobile-device-when-motion-is-detected-with-conditions/604156)
    (v2.2.9) [Automatización]
  author: TheFalseReality
  homeassistant:
    min_version: 2024.6.0
  domain: automation
  source_url: https://gist.github.com/TheRealFalseReality/471a961df8db47dd6feb9ca32b24b2fa
  input:
    trigger_additional:
      name: Disparador(es)
      description: Añade los disparadores para esta automatización
      default: []
      selector:
        trigger: {}
    camera:
      name: Cámara
      description: La cámara que creará la instantánea
      selector:
        entity:
          domain:
          - camera
          multiple: false
          reorder: false
    delay:
      name: Retraso de la instantánea
      description: Tiempo de espera antes de crear la instantánea de la cámara.
      default:
        seconds: 1
      selector:
        duration:
          enable_second: true
    condition_auto:
      name: Añadir condición(es) para ejecutar esta automatización
      description: Añade condiciones si es necesario para que se ejecute la automatización. Nota, si
        las condiciones devuelven `false`, no se ejecutará ninguna acción.
      default: []
      selector:
        condition: {}
    condition:
      name: Añadir condición(es) para enviar la instantánea
      description: Añade condiciones si es necesario para enviar la instantánea al dispositivo
      default: []
      selector:
        condition: {}
    notify_device:
      name: Dispositivo a notificar
      description: 'Selecciona un dispositivo para enviar notificaciones. El dispositivo debe tener instalada
        la aplicación oficial de Home Assistant para recibir notificaciones.


        Para dispositivos Google TV, prueba con [Notifications for Android TV](https://play.google.com/store/apps/details?id=de.cyberdream.androidtv.notifications.google&pcampaignid=web_share).
        Para notificar a varios dispositivos, crea un [Grupo de notificación](https://companion.home-assistant.io/docs/notifications/notifications-basic/#sending-notifications-to-multiple-devices),
        y consulta **Notificar a un grupo o Android TV** más abajo.'
      default: false
      selector:
        device:
          integration: mobile_app
          multiple: false
    notification_title:
      name: Título de la notificación
      description: 'Por defecto: "¡Movimiento detectado!"'
      default: ¡Movimiento detectado!
    notification_message:
      name: Mensaje de la notificación
      description: 'Por defecto: "¡Movimiento detectado! Instantánea de {{ camera_name }} a las
        {{ time }}."'
      default: ¡Movimiento detectado! Instantánea de {{ camera_name }} a las {{ time }}.
    android_section:
      name: Opciones específicas de Android
      description: Estas son opciones específicas para Android
      icon: mdi:android
      collapsed: true
      input:
        notification_channel:
          name: Canal de notificación - Solo Android
          description: Crea un nuevo canal para las notificaciones para permitir sonidos de notificación personalizados,
            patrones de vibración y omitir el modo No molestar. Se configura directamente en el dispositivo
            Android -> Ajustes de la app Home Assistant -> Notificaciones.
            (por defecto = Instantánea de {{ camera_name }})
          default: 'Instantánea de {{ camera_name }}'
        notification_sticky:
          name: Notificación fija (Sticky) - Solo Android
          description: 'Cuando está activado, la notificación permanecerá activa en el dispositivo
            después de tocarla y no desaparecerá a menos que se deslice para borrarla.

            '
          default: true
          selector:
            boolean: {}
        notification_color:
          name: Color de la notificación - Solo Android
          description: 'Establece el color de la notificación en tu dispositivo Android,
            en HEX. (por defecto = Azul acero - #03a9f4)'
          default: '#03a9f4'
          selector:
            select:
              options:
              - label: 'Azul acero - #03a9f4'
                value: '#03a9f4'
              - label: 'Rojo - #f44336'
                value: '#f44336'
              - label: 'Rosa - #e91e63'
                value: '#e91e63'
              - label: 'Morado - #926bc7'
                value: '#926bc7'
              - label: 'Morado oscuro - #6e41ab'
                value: '#6e41ab'
              - label: 'Índigo - #3f51b5'
                value: '#3f51b5'
              - label: 'Azul - #2196f3'
                value: '#2196f3'
              - label: 'Azul claro - #03a9f4'
                value: '#03a9f4'
              - label: 'Cian - #00bcd4'
                value: '#00bcd4'
              - label: 'Turquesa (Teal) - #009688'
                value: '#009688'
              - label: 'Verde - #4caf50'
                value: '#4caf50'
              - label: 'Verde claro - #8bc34a'
                value: '#8bc34a'
              - label: 'Lima - #cddc39'
                value: '#cddc39'
              - label: 'Amarillo - #ffeb3b'
                value: '#ffeb3b'
              - label: 'Ámbar - #ffc107'
                value: '#ffc107'
              - label: 'Naranja - #ff9800'
                value: '#ff9800'
              - label: 'Naranja oscuro - #ff5722'
                value: '#ff5722'
              - label: 'Marrón - #795548'
                value: '#795548'
              - label: 'Gris claro - #bdbdbd'
                value: '#bdbdbd'
              - label: 'Gris - #9e9e9e'
                value: '#9e9e9e'
              - label: 'Gris oscuro - #606060'
                value: '#606060'
              - label: 'Gris azulado - #607d8b'
                value: '#607d8b'
              - label: 'Negro - #000000'
                value: '#000000'
              - label: 'Blanco - #ffffff'
                value: '#ffffff'
              custom_value: true
              sort: false
              multiple: false
        notification_icon:
          name: Icono de la barra de estado - Solo Android
          description: Cambia el icono que se muestra en la notificación.
          default: mdi:cctv
          selector:
            icon:
              placeholder: mdi:cctv
    tv_section:
      name: Opciones de Android TV
      description: Estas son opciones para Android TV
      icon: mdi:youtube-tv
      collapsed: true
      input:
        android_tv:
          name: Android TV - LEGADO (EXPERIMENTAL)
          description: Marca esta casilla si vas a enviar notificaciones a un dispositivo de tipo Android TV.
          default: false
          selector:
            boolean: {}
        tv_position:
          name: Posición de la notificación en TV (EXPERIMENTAL)
          description: Establece la posición de la notificación en tu televisor
          default: center
          selector:
            select:
              mode: dropdown
              options:
              - label: "Abajo a la derecha"
                value: bottom-right
              - label: "Abajo a la izquierda"
                value: bottom-left
              - label: "Arriba a la derecha"
                value: top-right
              - label: "Arriba a la izquierda"
                value: top-left
              - label: "Centro"
                value: center
              sort: false
              custom_value: false
              multiple: false
        tv_size:
          name: Tamaño de la notificación en TV (EXPERIMENTAL)
          description: Establece el tamaño de la notificación en tu televisor.
          default: large
          selector:
            select:
              mode: dropdown
              options:
              - label: "Pequeño"
                value: small
              - label: "Mediano"
                value: medium
              - label: "Grande"
                value: large
              - label: "Máximo"
                value: max
              sort: false
              custom_value: false
              multiple: false
        tv_duration:
          name: Duración de la notificación en TV (EXPERIMENTAL)
          description: El tiempo (en segundos) que se mostrará la notificación en tu televisor.
          default: 10
          selector:
            number:
              max: 300.0
              min: 0.0
              unit_of_measurement: segundos
              step: 1.0
              mode: slider
        tv_transparency:
          name: Transparencia de la notificación en TV (EXPERIMENTAL)
          description: Establece la transparencia de la notificación en tu televisor.
          default: 0%
          selector:
            select:
              mode: dropdown
              options:
              - 0%
              - 25%
              - 50%
              - 75%
              - 100%
              sort: false
              custom_value: false
              multiple: false
        tv_interrupt:
          name: Interrupción de notificación en TV (EXPERIMENTAL)
          description: Si se activa, la notificación es interactiva y se puede descartar o seleccionar
            para ver más detalles. Dependiendo de la aplicación en ejecución (ej. Netflix), esto podría detener la reproducción.
          default: false
          selector:
            boolean: {}
    ios_section:
      name: Opciones específicas de iOS
      description: Estas son opciones específicas para iOS (iPhone / iPad)
      icon: mdi:apple-ios
      collapsed: true
      input:
        notification_sound:
          name: Sonido de notificación - Solo iOS
          description: 'Puedes especificar un archivo de sonido en tu dispositivo que se reproducirá
            con las notificaciones. Puedes importar el archivo de sonido a Home Assistant
            o introducir el nombre del [sonido preinstalado](https://companion.home-assistant.io/docs/notifications/notification-sounds/#pre-installed-notification-sounds)
            (ejemplo: US-EN-Alexa-Motion-Detected-Generic.wav).'
          default: default
          selector:
            select:
              options:
              - label: Por defecto
                value: default
              - label: Ninguno
                value: none
              - label: Alexa - Movimiento Detectado
                value: US-EN-Alexa-Motion-Detected-Generic.wav
              - label: Morgan Freeman - Movimiento Detectado
                value: US-EN-Morgan-Freeman-Motion-Detected.wav
              custom_value: true
              sort: false
              multiple: false
        notification_volume:
          name: Volumen del sonido - Solo iOS
          description: Especifica un nivel de volumen en %
          default: 1
          selector:
            number:
              max: 1.0
              min: 0.0
              unit_of_measurement: '%'
              step: 1.0
              mode: slider
        notification_critical:
          name: Notificación crítica - Solo iOS
          description: Enviar como una notificación crítica al dispositivo móvil. Esto
            ignorará los modos de silencio o vibración.
          default: false
          selector:
            boolean: {}
    optional_section:
      name: Opciones opcionales o experimentales
      description: Estas son opciones opcionales o experimentales
      icon: mdi:apple-keyboard-option
      collapsed: true
      input:
        notify:
          name: Notificar dispositivo
          description: ¿Enviar notificación al dispositivo?
          default: true
          selector:
            boolean: {}
        delay_send:
          name: Retraso en el envío de la instantánea
          description: Tiempo de espera antes de enviar la notificación, en segundos.
          default: 0
          selector:
            duration:
              enable_second: true
        delay_notification:
          name: Retraso entre notificaciones
          description: Tiempo de espera antes de enviar otra notificación, en segundos. (ej.
            5 minutos = 300 segundos)
          default: 60
          selector:
            number:
              min: 0.0
              max: 86400.0
              unit_of_measurement: segundos
              mode: box
              step: 1.0
        notification_alert_once:
          name: Alertar una sola vez
          description: Solo la primera notificación de cada evento reproducirá un sonido.
            Las actualizaciones serán silenciosas. Los dispositivos iOS con notificaciones críticas activadas
            arriba seguirán escuchando los sonidos críticos por defecto en las actualizaciones.
          default: false
          selector:
            boolean: {}
        notification_group:
          name: Grupo de notificaciones
          description: El nombre del grupo que determinará si las notificaciones se agrupan
            en tu dispositivo móvil. (por defecto = Instantánea de {{ camera_name }})
          default: 'Instantánea de {{ camera_name }}'
        data_clickaction_url:
          name: URL a navegar
          description: La URL a la que navegar al hacer clic en la notificación. (por defecto
            = /lovelace)
          default: /lovelace
        notify_group:
          name: Notificar a un grupo o Android TV
          description: "Introduce el nombre del grupo o del televisor individual para las notificaciones.
            (ejemplo: all_devices) Esto anulará la configuración de dispositivo individual de arriba.
            El dispositivo debe ejecutar la aplicación oficial de Home Assistant para recibir notificaciones.
            Para notificar a varios dispositivos, crea un [Grupo de notificación](https://companion.home-assistant.io/docs/notifications/notifications-basic/#sending-notifications-to-multiple-devices).\n
            \n\nImportante: Los grupos que contienen tanto dispositivos móviles como televisores no mostrarán
            las instantáneas en el televisor a menos que 'Android TV' esté activado. Sin embargo, esta configuración
            evita que los teléfonos Android reciban instantáneas"
          default: ''
        file_path:
          name: Ruta del archivo
          description: "La ruta del archivo para almacenar la instantánea más reciente. \n\nNO
            AÑADAS `/local`, el blueprint lo hará automáticamente sustituyéndolo con `/media` ->
            `/media/local`. \n\nPor defecto es **/media/snapshots/<camera_name>** `/media/snapshots/{{
            states[camera].object_id }}/last_motion.jpg`\n\n Prueba con `/config/www/snapshots/{{
            states[camera].object_id }}/last_motion.jpg` si tienes problemas"
          default: /media/snapshots/{{ states[camera].object_id }}/last_motion.jpg
        save_archive_file:
          name: ¿Guardar archivos en el archivo histórico?
          description: Elige si deseas activar el guardado del historial de instantáneas antiguas o no (por defecto
            = desactivado).
          default: false
          selector:
            boolean: {}
        conditionSave:
          name: Añadir condición(es) para archivar la instantánea
          description: Añade condiciones si es necesario para guardar los archivos de historial de instantáneas en un directorio.
          default: []
          selector:
            condition: {}
        archive_file_path:
          name: Ruta del archivo histórico
          description: 'La ruta del archivo para almacenar la instantánea en una carpeta de archivo histórico.


            NO AÑADAS `/local`, el blueprint lo hará automáticamente con `/media`
            -> `/media/local`.


            Por defecto es **/media/snapshots/<camera_name>** - `/media/snapshots/{{
            states[camera].object_id }}/archive/motion_{{ now().strftime("%Y%m%d-%H%M%S")`.'
          default: /media/snapshots/{{ states[camera].object_id }}/archive/motion_{{
            now().strftime("%Y%m%d-%H%M%S") }}.jpg
        additional_actions_before:
          name: Acciones adicionales antes
          description: Añade acciones adicionales a la automatización. Se ejecutarán antes de todo lo demás.
            ¡Útil para encender una luz antes de hacer la instantánea!
          default: []
          selector:
            action: {}
        additional_actions:
          name: Acciones adicionales después
          description: Añade acciones adicionales a la automatización. Se ejecutarán después de todo lo demás.
          default: []
          selector:
            action: {}
        mode_select:
          name: Selección de modo
          description: Selecciona el modo de ejecución para la automatización. (por defecto = Parallel)
          default: parallel
          selector:
            select:
              options:
              - label: Single (Único)
                value: single
              - label: Restart (Reiniciar)
                value: restart
              - label: Queued (En cola)
                value: queued
              - label: Parallel (Paralelo)
                value: parallel
              multiple: false
              custom_value: false
              sort: false
        action_type:
          name: Tipo de acción (EXPERIMENTAL)
          description: 'Establece el tipo de acción, consulta [Actionable Notifications](https://companion.home-assistant.io/docs/notifications/actionable-notifications/).
            por defecto: URI'
          default: URI
        action_title:
          name: Título de la acción (EXPERIMENTAL)
          description: Título de la acción que aparecerá junto con la notificación
          default: Abrir cuadro de mando
        action_uri:
          name: URI de la acción (EXPERIMENTAL)
          description: 'URI a la que navegar. por defecto: /lovelace'
          default: '{{ clickActionURL }}'
trigger: !input trigger_additional
variables:
  trigger_additional: !input trigger_additional
  camera: !input camera
  camera_name: '{{ states[camera].name }}'
  notify_device: !input notify_device
  time: '{{ now().strftime("%H:%M") }}'
  date: '{{ now().strftime("%Y-%m-%d") }}'
  notification_title: !input notification_title
  notification_message: !input notification_message
  file_path: !input file_path
  archive_file_path: !input archive_file_path
  delay: !input delay
  delay_notification: !input delay_notification
  snapshot_create_file_path: !input file_path
  snapshot_access_file_path: '{{ snapshot_create_file_path | replace(''/config/www'',
    ''/local'') | replace(''/media'', ''/media/local'') }}'
  condition: !input condition
  conditionSave: !input conditionSave
  condition_auto: !input condition_auto
  clickActionURL: !input data_clickaction_url
  save_archive_file: !input save_archive_file
  additional_actions: !input additional_actions
  additional_actions_before: !input additional_actions_before
  notify: !input notify
  notify_group: !input notify_group
  notify_group_target: '{{ notify_group | lower | regex_replace(''^notify\.'', '''')
    | replace('' '',''_'') }}'
  notification_channel: !input notification_channel
  notification_group: !input notification_group
  notification_sticky: !input notification_sticky
  notification_color: !input notification_color
  notification_critical: !input notification_critical
  notification_alert_once: !input notification_alert_once
  notification_icon: !input notification_icon
  notification_sound: !input notification_sound
  notification_volume: !input notification_volume
  android_tv: !input android_tv
  action_type: !input action_type
  action_title: !input action_title
  action_uri: !input action_uri
  tv_position: !input tv_position
  tv_size: !input tv_size
  tv_duration: !input tv_duration
  tv_transparency: !input tv_transparency
  tv_interrupt: !input tv_interrupt
  mode_select: !input mode_select
  delay_send: !input delay_send
action:
- if:
  - condition: !input condition_auto
  then:
  - choose: []
    default: !input additional_actions_before
  - delay: !input delay
  - service: camera.snapshot
    entity_id: !input camera
    data:
      filename: !input file_path
  - delay: !input delay_send
  - if:
    - condition: template
      value_template: !input notify
    then:
    - if:
      - condition: !input condition
      then:
      - if:
        - condition: template
          value_template: '{{ not this.attributes.last_triggered or (now() - this.attributes.last_triggered).seconds
            > delay_notification }}'
        then:
        - choose:
          - conditions: '{{ android_tv }}'
            sequence:
            - service: notify.{{ notify_group_target }}
              data:
                title: !input notification_title
                message: !input notification_message
                data:
                  channel: !input notification_channel
                  group: !input notification_group
                  color: !input notification_color
                  clickAction: !input data_clickaction_url
                  sticky: !input notification_sticky
                  notification_icon: !input notification_icon
                  ttl: 0
                  priority: high
                  image:
                    path: '{{ snapshot_access_file_path }}'
                  fontsize: '{{tv_size}}'
                  position: '{{tv_position}}'
                  duration: '{{tv_duration}}'
                  transparency: '{{tv_transparency}}'
                  interrupt: '{{tv_interrupt}}'
                  timeout: 30
          - conditions: '{{ not notify_group_target }}'
            sequence:
            - device_id: !input notify_device
              domain: mobile_app
              type: notify
              title: !input notification_title
              message: !input notification_message
              data:
                channel: !input notification_channel
                group: !input notification_group
                color: !input notification_color
                image: '{{ snapshot_access_file_path }}'
                clickAction: !input data_clickaction_url
                sticky: !input notification_sticky
                alert_once: !input notification_alert_once
                notification_icon: !input notification_icon
                ttl: 0
                priority: high
                attachment:
                  url: '{{ snapshot_access_file_path }}'
                  content_type: JPEG
                url: !input data_clickaction_url
                push:
                  sound:
                    name: !input notification_sound
                    volume: !input notification_volume
                    critical: '{{ notification_critical }}'
                actions:
                - action: '{{ action_type }}'
                  title: '{{ action_title }}'
                  uri: '{{ action_uri }}'
          default:
          - service: notify.{{ notify_group_target }}
            data:
              title: !input notification_title
              message: !input notification_message
              data:
                channel: !input notification_channel
                group: !input notification_group
                color: !input notification_color
                image: '{{ snapshot_access_file_path }}'
                clickAction: !input data_clickaction_url
                sticky: !input notification_sticky
                alert_once: !input notification_alert_once
                notification_icon: !input notification_icon
                ttl: 0
                priority: high
                attachment:
                  url: '{{ snapshot_access_file_path }}'
                  content_type: JPEG
                url: !input data_clickaction_url
                push:
                  sound:
                    name: !input notification_sound
                    volume: !input notification_volume
                    critical: '{{ iif(notification_critical, 1, 0) }}'
                actions:
                - action: '{{ action_type }}'
                  title: '{{ action_title }}'
                  uri: '{{ action_uri }}'
  - if:
    - condition: template
      value_template: !input save_archive_file
    then:
    - if:
      - condition: !input conditionSave
      then:
      - service: camera.snapshot
        entity_id: !input camera
        data:
          filename: !input archive_file_path
  - choose: []
    default: !input additional_actions
mode: !input mode_select
